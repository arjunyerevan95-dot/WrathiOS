name: iOS bootstrap

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ios-bootstrap-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: macos-15-intel
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository policy and metadata
        run: ./scripts/check_repository.sh

      - name: Test Gate 4 data contract
        id: gate4-contract
        continue-on-error: true
        run: bash scripts/test_gate4_data_contract.sh

      - name: Upload Gate 4 data-contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate4-data-contract
          path: Derived/gate4-contract-tests
          if-no-files-found: warn

      - name: Fetch and verify pinned upstream sources
        run: ./scripts/fetch_upstream.sh

      - name: Validate Gate 1 source manifest
        run: python3 scripts/validate_engine_manifest.py --require-upstream

      - name: Probe Gate 2 arm64 engine compilation
        id: gate2-probe
        continue-on-error: true
        run: python3 scripts/gate2_compile_probe.py

      - name: Upload Gate 2 compile report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-compile-probe
          path: Artifacts/gate2-compile-probe
          if-no-files-found: warn

      - name: Build Gate 2 audio dependencies
        id: gate2-audio
        continue-on-error: true
        run: bash scripts/build_gate2_audio_deps.sh

      - name: Upload Gate 2 audio dependencies
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-audio-deps
          path: Artifacts/gate2-audio-deps
          if-no-files-found: warn

      - name: Build Gate 2 SDL2
        id: gate2-sdl
        continue-on-error: true
        run: bash scripts/build_gate2_sdl.sh

      - name: Upload Gate 2 SDL2
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-sdl
          path: Artifacts/gate2-sdl
          if-no-files-found: warn

      - name: Build Gate 2 FreeType
        id: gate2-freetype
        continue-on-error: true
        run: bash scripts/build_gate2_freetype.sh

      - name: Upload Gate 2 FreeType
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-freetype
          path: Artifacts/gate2-freetype
          if-no-files-found: warn

      - name: Build Gate 2 engine archive
        id: gate2-engine-archive
        continue-on-error: true
        run: python3 scripts/build_gate2_engine_archive.py

      - name: Upload Gate 2 engine archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate2-engine-archive
          path: Artifacts/gate2-engine-archive
          if-no-files-found: warn

      - name: Install XcodeGen
        if: always()
        run: brew install xcodegen

      - name: Generate Xcode project
        if: always()
        run: ./scripts/generate_project.sh

      - name: Build simulator smoke target
        if: always()
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project WrathiOS.xcodeproj \
            -scheme WrathiOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild-smoke.log

      - name: Upload Xcode smoke-build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-smoke-log
          path: xcodebuild-smoke.log
          if-no-files-found: warn

      - name: Build Gate 3 device graphics diagnostic
        id: gate3-device-diagnostic
        if: always()
        continue-on-error: true
        run: bash scripts/build_gate3_device_diagnostic.sh

      - name: Upload Gate 3 device graphics evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate3-device-diagnostic
          path: Artifacts/gate3-device-diagnostic
          if-no-files-found: warn

      - name: Build Gate 4 licensed-data importer
        id: gate4-device-importer
        if: always()
        continue-on-error: true
        run: bash scripts/build_gate4_device_importer.sh

      - name: Upload Gate 4 importer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate4-device-importer
          path: Artifacts/gate4-device-importer
          if-no-files-found: warn

      - name: Enforce Gate 4 generated evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            Derived/gate4-contract-tests/valid.txt
            Derived/gate4-contract-tests/loose.txt
            Derived/gate4-contract-tests/missing.txt
            Derived/gate4-contract-tests/unsafe.txt
            Derived/gate4-contract-tests/symlinked.txt
            Derived/deps/iphoneos/lib/libogg.a
            Derived/deps/iphoneos/lib/libvorbis.a
            Derived/deps/iphoneos/lib/libvorbisfile.a
            Derived/deps/iphoneos/lib/libSDL2.a
            Derived/deps/iphoneos/lib/libfreetype.a
            Derived/gate2-engine-archive/libwrath-engine.a
            Artifacts/gate3-device-diagnostic/WrathiOSGate3-unsigned.ipa
            Artifacts/gate3-device-diagnostic/SHA256SUMS.txt
            Artifacts/gate4-device-importer/WrathiOSGate4-unsigned.ipa
            Artifacts/gate4-device-importer/SHA256SUMS.txt
            Artifacts/gate4-device-importer/summary.md
          )

          for file in "${required_files[@]}"; do
            [[ -s "$file" ]] || {
              echo "Missing or empty gate evidence: $file" >&2
              exit 1
            }
          done

          grep -q '^compatible=1$' Derived/gate4-contract-tests/valid.txt
          grep -q '^compatible=1$' Derived/gate4-contract-tests/loose.txt
          grep -q 'menu.dat' Derived/gate4-contract-tests/missing.txt
          grep -q 'unsafe path' Derived/gate4-contract-tests/unsafe.txt
          grep -q 'Symbolic links' Derived/gate4-contract-tests/symlinked.txt
          grep -q 'Runtime engine startup: absent' Artifacts/gate4-device-importer/summary.md

          echo "Gate 1–4 generated evidence is complete"
