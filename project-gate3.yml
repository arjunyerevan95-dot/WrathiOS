name: WrathiOSGate3
options:
  bundleIdPrefix: com.arjukstudios
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.3"
settings:
  base:
    CLANG_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: gnu++17
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.3"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  WrathiOSGate3:
    type: application
    platform: iOS
    deploymentTarget: "16.3"
    sources:
      - path: App
        excludes:
          - Info.plist
      - path: Derived/gate3-platform
    dependencies:
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
      - sdk: OpenGLES.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
      - sdk: CoreMotion.framework
      - sdk: CoreBluetooth.framework
      - sdk: GameController.framework
      - sdk: Metal.framework
      - sdk: CoreHaptics.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arjukstudios.wrathios.gate3
        PRODUCT_NAME: WrathiOSGate3
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 0.0.2
        CURRENT_PROJECT_VERSION: 2
        CODE_SIGN_STYLE: Automatic
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: iphoneos
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
        ENABLE_DEBUG_DYLIB: NO
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Derived/deps/iphoneos/include/SDL2"
          - "$(SRCROOT)/Derived/deps/iphoneos/include"
          - "$(SRCROOT)/Derived/deps/iphoneos/include/freetype2"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Derived/deps/iphoneos/lib"
          - "$(SRCROOT)/Derived/gate2-engine-archive"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - WRATH_IOS=1
          - WRATH_ENGINE_LINKED=1
          - WRATH_GATE3_DIAGNOSTIC=1
          - __IPHONEOS__=1
        OTHER_LDFLAGS:
          - "$(inherited)"
          - -ObjC
          - -force_load
          - "$(SRCROOT)/Derived/gate2-engine-archive/libwrath-engine.a"
          - -force_load
          - "$(SRCROOT)/Derived/deps/iphoneos/lib/libSDL2.a"
          - -lfreetype
          - -lvorbisfile
          - -lvorbis
          - -logg
          - -lz
    scheme:
      gatherCoverageData: false
