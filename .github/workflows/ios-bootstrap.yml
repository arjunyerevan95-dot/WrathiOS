name: iOS bootstrap

on:
  push:
  pull_request:

jobs:
  validate-and-build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate repository policy and metadata
        run: ./scripts/check_repository.sh

      - name: Fetch and verify pinned upstream sources
        run: ./scripts/fetch_upstream.sh

      - name: Validate Gate 1 source manifest
        run: python3 scripts/validate_engine_manifest.py --require-upstream

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: ./scripts/generate_project.sh

      - name: Build simulator smoke target
        run: >-
          xcodebuild
          -project WrathiOS.xcodeproj
          -scheme WrathiOS
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          CODE_SIGNING_ALLOWED=NO
          build
