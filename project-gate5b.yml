name: WrathiOSGate5B
options:
  bundleIdPrefix: com.arjukstudios
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "16.3"
settings:
  base:
    CLANG_C_LANGUAGE_STANDARD: gnu17
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_OBJC_ARC: YES
    ENABLE_BITCODE: NO
    IPHONEOS_DEPLOYMENT_TARGET: "16.3"
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  WrathiOSGate5B:
    type: application
    platform: iOS
    deploymentTarget: "16.3"
    sources:
      - path: Gate5
      - path: Gate4/WrathDataContract.cpp
      - path: Gate4/WrathDataContract.hpp
      - path: Gate4/WrathDataImporter.h
      - path: Gate4/WrathDataImporter.mm
      - path: Gate4/WrathImportViewController.h
      - path: Gate4/WrathImportViewController.mm
      - path: App/LaunchScreen.storyboard
    dependencies:
      - sdk: UIKit.framework
      - sdk: Foundation.framework
      - sdk: UniformTypeIdentifiers.framework
      - sdk: CoreGraphics.framework
      - sdk: QuartzCore.framework
      - sdk: OpenGLES.framework
      - sdk: AudioToolbox.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
      - sdk: CoreMotion.framework
      - sdk: CoreBluetooth.framework
      - sdk: GameController.framework
      - sdk: Metal.framework
      - sdk: CoreHaptics.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arjukstudios.wrathios.gate3
        PRODUCT_NAME: WrathiOSGate5B
        INFOPLIST_FILE: App/Gate5BInfo.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: 0.0.6
        CURRENT_PROJECT_VERSION: 6
        CODE_SIGN_STYLE: Automatic
        SDKROOT: iphoneos
        SUPPORTED_PLATFORMS: iphoneos
        ARCHS: arm64
        ONLY_ACTIVE_ARCH: NO
        ENABLE_DEBUG_DYLIB: NO
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Gate4"
          - "$(SRCROOT)/Gate5"
          - "$(SRCROOT)/Vendor/wrath-darkplaces"
          - "$(SRCROOT)/Derived/deps/iphoneos/include/SDL2"
          - "$(SRCROOT)/Derived/deps/iphoneos/include"
          - "$(SRCROOT)/Derived/deps/iphoneos/include/freetype2"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/Derived/deps/iphoneos/lib"
          - "$(SRCROOT)/Derived/gate5b-engine-archive"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - WRATH_IOS=1
          - WRATH_ENGINE_LINKED=1
          - WRATH_IOS_GATE5=1
          - WRATH_IOS_GATE5B=1
          - __IPHONEOS__=1
        OTHER_LDFLAGS:
          - "$(inherited)"
          - -ObjC
          - -force_load
          - "$(SRCROOT)/Derived/gate5b-engine-archive/libwrath-engine-gate5b.a"
          - -force_load
          - "$(SRCROOT)/Derived/deps/iphoneos/lib/libSDL2.a"
          - -lfreetype
          - -lvorbisfile
          - -lvorbis
          - -logg
          - -lz
    scheme:
      gatherCoverageData: false
